        value: "8089"

  # ----------------------------------------------------
  # Next.js Frontend (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: daaakiya-frontend
    env: docker
    rootDir: apps/web
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: PORT
        value: "3000"

databases:
  # Managed PostgreSQL Database
  - name: dpg-postgres
    databaseName: daaakiya_db
    user: daaakiya
    plan: free
