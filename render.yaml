    rootDir: services/property-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
