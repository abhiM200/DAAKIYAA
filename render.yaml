  # ----------------------------------------------------
  # Marketplace Service
  # ----------------------------------------------------
  - type: web
    name: marketplace-service
    env: docker
    rootDir: services/marketplace-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
