services:
  # ----------------------------------------------------
  # Redis (Private Service running Redis Docker image)
  # ----------------------------------------------------
  - type: pserv
    name: daaakiya-redis
    env: docker
    dockerfilePath: Dockerfile.redis
    plan: free
    ports:
      - port: 6379
        protocol: TCP

  # ----------------------------------------------------
  # Spring Boot API Gateway (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: api-gateway
    env: docker
    rootDir: services/api-gateway
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: 8080

  # ----------------------------------------------------
  # Auth Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: auth-service
    env: docker
    rootDir: services/auth-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8081

  # ----------------------------------------------------
  # User Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: user-service
    env: docker
    rootDir: services/user-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8082

  # ----------------------------------------------------
  # Content Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: content-service
    env: docker
    rootDir: services/content-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8083

  # ----------------------------------------------------
  # Interaction Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: interaction-service
    env: docker
    rootDir: services/interaction-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8084

  # ----------------------------------------------------
  # Messaging Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: messaging-service
    env: docker
    rootDir: services/messaging-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: SPRING_DATA_REDIS_HOST
        value: daaakiya-redis
      - key: SPRING_DATA_REDIS_PORT
        value: "6379"
      - key: PORT
        value: 8085

  # ----------------------------------------------------
  # Match Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: match-service
    env: docker
    rootDir: services/match-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8086

  # ----------------------------------------------------
  # Jobs Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: jobs-service
    env: docker
    rootDir: services/jobs-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8087

  # ----------------------------------------------------
  # Property Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: property-service
    env: docker
    rootDir: services/property-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8088

  # ----------------------------------------------------
  # Marketplace Service (Private Service)
  # ----------------------------------------------------
  - type: pserv
    name: marketplace-service
    env: docker
    rootDir: services/marketplace-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dpg-postgres
          property: connectionURI
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: 8089

  # ----------------------------------------------------
  # Next.js Frontend (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: daaakiya-frontend
    env: docker
    rootDir: apps/web
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: PORT
        value: 3000

databases:
  # Managed PostgreSQL Database
  - name: dpg-postgres
    databaseName: daaakiya_db
    user: daaakiya
    plan: free
