services:
  # ----------------------------------------------------
  # Redis (Private Service running Redis Docker image)
  # ----------------------------------------------------
  - type: web
    name: daaakiya-redis
    env: docker
    dockerfilePath: Dockerfile.redis
    plan: free
  
  # ----------------------------------------------------
  # Spring Boot Monolith (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: monolith-service
    env: docker
    rootDir: services/monolith-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: SPRING_DATA_REDIS_HOST
        value: daaakiya-redis
      - key: SPRING_DATA_REDIS_PORT
        value: "6379"
      - key: PORT
        value: "8080"

  # ----------------------------------------------------
  # Next.js Frontend (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: daaakiya-frontend
    env: docker
    rootDir: apps/web
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: monolith-service
          property: host
      - key: PORT
        value: "3000"

databases:
  # Managed PostgreSQL Database
  - name: dpg-postgres
    databaseName: daaakiya_db
    user: daaakiya
    plan: free
