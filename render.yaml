services:
  # ----------------------------------------------------
  # Redis (Private Service running Redis Docker image)
  # ----------------------------------------------------
  - type: web
    name: daaakiya-redis
    env: docker
    dockerfilePath: Dockerfile.redis
    plan: free
  
  # ----------------------------------------------------
  # Spring Boot API Gateway (Public Web Service)
  # ----------------------------------------------------
  - type: web
    name: api-gateway
    env: docker
    rootDir: services/api-gateway
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: "8080"

  # ----------------------------------------------------
  # Auth Service
  # ----------------------------------------------------
  - type: web
    name: auth-service
    env: docker
    rootDir: services/auth-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: "8081"

  # ----------------------------------------------------
  # User Service
  # ----------------------------------------------------
  - type: web
    name: user-service
    env: docker
    rootDir: services/user-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: "8082"

  # ----------------------------------------------------
  # Content Service
  # ----------------------------------------------------
  - type: web
    name: content-service
    env: docker
    rootDir: services/content-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: "8083"

  # ----------------------------------------------------
  # Interaction Service
  # ----------------------------------------------------
  - type: web
    name: interaction-service
    env: docker
    rootDir: services/interaction-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: PORT
        value: "8084"

  # ----------------------------------------------------
  # Messaging Service
  # ----------------------------------------------------
  - type: web
    name: messaging-service
    env: docker
    rootDir: services/messaging-service
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: dpg-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dpg-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dpg-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: dpg-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dpg-postgres
          property: password
      - key: SPRING_DATA_REDIS_HOST
        value: daaakiya-redis
      - key: SPRING_DATA_REDIS_PORT
        value: "6379"
      - key: PORT
        value: "8085"

  # ----------------------------------------------------
  # Match Service
  # ----------------------------------------------------
  - type: web
