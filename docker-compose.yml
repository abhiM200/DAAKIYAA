version: '3.8'

services:
  # PostgreSQL Database (used by Auth, User, Content services etc.)
  postgres:
    image: postgres:16-alpine
    container_name: daaakiya-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: daaakiya
      POSTGRES_PASSWORD: password
      POSTGRES_DB: daaakiya_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - daaakiya-network
    restart: unless-stopped

  # Redis Cache (used for sessions, fast read caches, WebSocket pub/sub)
  redis:
    image: redis:7-alpine
    container_name: daaakiya-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - daaakiya-network
    restart: unless-stopped

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: daaakiya-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - daaakiya-network

  # Apache Kafka (Event Bus)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: daaakiya-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - daaakiya-network

volumes:
  postgres-data:
  redis-data:

networks:
  daaakiya-network:
    driver: bridge
