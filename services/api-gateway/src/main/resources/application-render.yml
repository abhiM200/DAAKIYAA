spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://auth-service:8081
            predicates:
              - Path=/api/auth/**
          - id: user-service
            uri: http://user-service:8082
            predicates:
              - Path=/api/users/**
          - id: content-service
            uri: http://content-service:8083
            predicates:
              - Path=/api/content/**
          - id: interaction-service
            uri: http://interaction-service:8084
            predicates:
              - Path=/api/interactions/**
          - id: messaging-service
            uri: http://messaging-service:8085
            predicates:
              - Path=/api/messaging/**
          - id: match-service
            uri: http://match-service:8086
            predicates:
              - Path=/api/matches/**
          - id: jobs-service
            uri: http://jobs-service:8087
            predicates:
              - Path=/api/jobs/**
          - id: property-service
            uri: http://property-service:8088
            predicates:
              - Path=/api/properties/**
          - id: marketplace-service
            uri: http://marketplace-service:8089
            predicates:
              - Path=/api/marketplace/**
