server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/auth/**
          - id: user-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/users/**
          - id: content-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/content/**
          - id: interaction-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/interactions/**
          - id: messaging-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/messaging/**
          - id: match-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/matches/**
          - id: jobs-service
            uri: http://localhost:8087
            predicates:
              - Path=/api/jobs/**
          - id: property-service
            uri: http://localhost:8088
            predicates:
              - Path=/api/properties/**
          - id: marketplace-service
            uri: http://localhost:8089
            predicates:
              - Path=/api/marketplace/**
