server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:daaakiya_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: 4b29b6b9076046e7f8d380e227092bb4560a0f8b1c1d819446f7a6a7c3d2e1f0
  expiration: 86400000 # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info
